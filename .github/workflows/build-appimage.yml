name: Build AppImage (Continuous)

permissions:
  contents: write

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: oraclelinux:8

    steps:
      - name: Delete old continuous release and tag
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          API="https://api.github.com/repos/${{ github.repository }}"

          # Query release by tag
          RESPONSE=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "$API/releases/tags/continuous")

          # Extract release ID without jq
          RELEASE_ID=$(echo "$RESPONSE" | grep '"id":' | head -n1 | sed 's/[^0-9]*//g')

          if [ -n "$RELEASE_ID" ]; then
            echo "Deleting release ID: $RELEASE_ID"
            curl -s -X DELETE \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "$API/releases/$RELEASE_ID"
          else
            echo "No existing release found."
          fi

          # Delete the tag if it exists
          TAG_RESPONSE=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "$API/git/refs/tags/continuous")

          TAG_EXISTS=$(echo "$TAG_RESPONSE" | grep -c '"ref":')

          if [ "$TAG_EXISTS" -gt 0 ]; then
            echo "Deleting tag: continuous"
            curl -s -X DELETE \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              "$API/git/refs/tags/continuous"
          else
            echo "Tag 'continuous' does not exist."
          fi
      - name: Update system
        run: |
          dnf -y update

      - name: Install dependencies
        run: |
          dnf install -y \
            patch wget file \
            python3 python3-pip \
            python3-gobject-base python3-cairo \
            keybinder3 \

      - uses: actions/checkout@v4

      - name: Make build script executable
        run: chmod +x build.sh

      - name: Build AppImage
        run: ./build.sh

      - name: Upload to Continuous Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: continuous
          name: Continuous Build
          files: "*.AppImage"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
